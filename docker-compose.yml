version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lokky-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/lokky
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      - mongo
    networks:
      - lokky-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    container_name: lokky-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=lokky
    volumes:
      - mongo-data:/data/db
    networks:
      - lokky-network
    restart: unless-stopped

  # Mongo Express (Interface web pour MongoDB)
  mongo-express:
    image: mongo-express:latest
    container_name: lokky-mongo-express
    ports:
      - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongo
    networks:
      - lokky-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  lokky-network:
    driver: bridge
