version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lokky-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb+srv://admin_styve:Cordialement_17@cluster0.w2oaucm.mongodb.net/Lokky?retryWrites=true&w=majority&appName=Cluster0
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - NABOO_API_KEY=${NABOO_API_KEY}
      - NABOO_WEBHOOK_SECRET=${NABOO_WEBHOOK_SECRET}
      - NABOO_API_URL=${NABOO_API_URL}
      - NABOO_SANDBOX_MODE=${NABOO_SANDBOX_MODE}
      - PREMIUM_MONTHLY_PRICE=${PREMIUM_MONTHLY_PRICE}
      - PREMIUM_ANNUAL_PRICE=${PREMIUM_ANNUAL_PRICE}
      - PREMIUM_CURRENCY=${PREMIUM_CURRENCY}
      - PREMIUM_TRIAL_DAYS=${PREMIUM_TRIAL_DAYS}
      - API_URL=${API_URL}
      - APP_URL=${APP_URL}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
    volumes:
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      - redis
    networks:
      - lokky-network
    restart: unless-stopped

  # Redis (Cache)
  redis:
    image: redis:7-alpine
    container_name: lokky-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - lokky-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  lokky-network:
    driver: bridge
